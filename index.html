<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A5 | Github Issue Tracker</title>
    <!-- <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon"> -->

    <!-- Google Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        *{
            font-family: "Geist", sans-serif;
            /* background-color: #F8FAFC; */
        }
    </style>

    <!-- TailwindCSS and DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


</head>
<body class="bg-[#F8FAFC]  flex items-center justify-center min-h-screen">
    <section class="w-[400px] p-6 bg-white rounded-lg shadow-lg space-y-4">
        <div class="text-center">
            <img class="mx-auto mb-5" src="./assets/github-logo.png" alt="">
            <h2 class="text-xl font-bold mb-1">GitHub Issues Tracker</h2>
            <p class="text-sm text-gray-600">Sign in to manage your issues</p>
        </div>

    <div>
        <label class=" font-medium">Username</label>
        <input type="text" placeholder="Enter Username" class="input rounded-md focus:outline-none focus:border-2 focus:border-blue-500 w-full p-3" />
        <p class="text-xs text-blue-600 mt-1 mb-4 font-semibold"> Default: admin </p>

        <label class=" font-medium">Password</label>
        <input type="password" placeholder="Enter Password" class="input rounded-md focus:outline-none focus:border-2 focus:border-blue-500 w-full p-3" />
        <p class="text-xs text-blue-600 mt-1 font-semibold"> Default: admin123 </p>

        <button class="btn btn-primary w-full mt-4 "> Sign In </button>
    </div>

    <div class="flex items-center">
        <div class="flex-grow border-t border-gray-300"></div>
        <span class="mx-3 text-gray-600 text-sm">OR</span>
        <div class="flex-grow border-t border-gray-300"></div>
    </div>

    <p class="text-center text-xs text-gray-500 mb-2">Demo Credentials:</p>

    <div class="flex justify-center text-sm py-4 bg-[#F8FAFC]">
        <div>
            <h2><span class="font-bold">Username:</span> admin</h2>
            <h2><span class="font-bold">Password:</span> admin123</h2>
        </div>
    </div>

    </section>
</body>
</html>
