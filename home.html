<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon"> -->

    <!-- Google Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        *{
            font-family: "Geist", sans-serif;
            /* background-color: #F8FAFC; */
        }
    </style>

    <!-- TailwindCSS and DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header class="flex justify-between items-center py-4 px-15">
        <div class="flex justify-center items-center gap-1">
            <img class="w-7 h-7" src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-xl">GitHub Issues Tracker</h2>
        </div>
        <div class="flex justify-center items-center gap-2">
            <label class="input outline-none rounded-md ">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input class="" type="search" required placeholder="Search issues..." />
            </label>
            <button class="btn btn-primary rounded-md border-none"><i class="fa-solid fa-plus"></i> New Issue</button>
        </div>
    </header>
</body>
</html>
