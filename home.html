<body class="bg-[#F8FAFC] min-h-screen">
    <header class="flex justify-between items-center py-4 px-5 md:px-15 bg-white">
        <div class="flex justify-start md:justify-center md:items-center flex-col md:flex-row gap-1">
            <img class="w-7 h-7" src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-sm md:text-xl">GitHub Issues Tracker</h2>
        </div>
        <div class="flex justify-center items-center gap-2">
            <label class="input outline-none rounded-md ">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input id="search"  type="search" placeholder="Search issues..." />
            </label>
            <button class="btn btn-primary rounded-md border-none"><i class="fa-solid fa-plus"></i> New Issue</button>
        </div>
    </header>

    <section class="w-11/12 mx-auto py-[60px] ">
        <div class=" bg-white flex items-center gap-3 p-6 rounded-md shadow-md">
            <button onclick="toggle('allBtn')" id="allBtn" class="btn btn-primary w-[120px]">All</button>
            <button onclick="toggle('openBtn')" id="openBtn" class="btn w-[120px]">Open</button>
            <button onclick="toggle('closedBtn')" id="closedBtn" class="btn w-[120px]">Closed</button>
        </div>


        <main class="bg-white rounded-md shadow-md ">
            <div class="flex justify-between items-center gap-3 p-6 border-b-2 border-gray-200  mt-4">
                <div class="left flex justify-between items-center gap-2 ">
                    <div class="w-[50px] h-[50px] bg-[#ECE4FF] rounded-full flex justify-center items-center">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 class="font-semibold text-xl"><span id="issueCounter">50</span> Issues</h2>
                        <p class="text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="right flex justify-between items-center gap-3">
                    <div class="flex gap-2 items-center">
                        <span class="bg-green-600 rounded-full w-3 h-3 inline-block"></span>
                        <span class="font-semibold">Open</span>
                    </div>
                    <div class="flex gap-2 items-center">
                        <span class="bg-purple-600 rounded-full w-3 h-3 inline-block"></span>
                        <span class="font-semibold">Closed</span>
                    </div>
                </div>
            </div>

            <div id="spinner" class="flex justify-center items-center hidden">
                <span class="loading loading-spinner loading-xl text-blue-700 h-[300px] "></span>
            </div>

            <div id="issueContainer" class="card-container p-6 bg-[#FBFBFB] grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
